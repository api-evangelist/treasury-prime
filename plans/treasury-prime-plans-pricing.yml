description: Treasury Prime is sold under custom contracts. Pricing is bespoke per
  program covering platform fees, per-transaction, per-card, ACH/wire, with monthly
  minimums.
notes: Sandbox is free; production requires partner bank engagement.
sources:
- https://www.treasuryprime.com/
- https://developers.treasuryprime.com/
plans:
- id: treasury-prime-sandbox
  name: Sandbox
  type: free
  description: Free sandbox at https://sandbox.treasuryprime.com.
  entries:
  - label: Sandbox Access
    name: sandbox
    type: included
    metric: api_calls
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: All APIs
  - name: Test Data
- id: treasury-prime-program
  name: Program (Custom)
  type: enterprise
  description: Custom contract with partner bank.
  entries:
  - label: Platform Fee
    name: platform_fee
    type: flat
    metric: subscription
    limit: 1
    timeFrame: month
    geo: global
    unit: 1
    price: negotiated
    userMultiplied: false
  - label: Per Transaction
    name: txn_fee
    type: metered
    metric: transaction
    limit: -1
    timeFrame: usage
    geo: global
    unit: 1
    price: negotiated
    userMultiplied: false
  elements:
  - name: Partner Bank
  - name: Production APIs
